name: Release

# Builds and (when the signing secrets are configured) signs the distributable artifacts:
#   - npm: per-OS prebuilt binaries published under @agentdeploymentco/argus*
#   - macOS: a signed + notarized Argus.app / .dmg
#   - Windows: an Authenticode-signed .msi / .exe
# All signing is gated on secrets being present, so this workflow runs end-to-end (producing
# UNSIGNED artifacts) before any certificate exists, and starts signing the moment the secrets are
# added. No secret value ever lives in this file — only references to `secrets.*`.
#
# Required secrets to activate signing (set in repo/org settings; never commit their values):
#   NPM_TOKEN                              npm automation token (npm publish)
#   APPLE_CERTIFICATE                      base64 of the Developer ID Application .p12
#   APPLE_CERTIFICATE_PASSWORD             its export password
#   APPLE_SIGNING_IDENTITY                 e.g. "Developer ID Application: … (TEAMID)"
#   APPLE_ID / APPLE_PASSWORD / APPLE_TEAM_ID   notarytool credentials (app-specific password)
#   WINDOWS_CERTIFICATE / WINDOWS_CERTIFICATE_PASSWORD   Authenticode signing cert (base64 + pwd)
#   TAURI_SIGNING_PRIVATE_KEY / …_PASSWORD updater signing key (Phase 7; separate from OS certs)

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  id-token: write # required for OIDC
  contents: write # create the GitHub Release and upload assets

jobs:
  npm:
    name: npm
    runs-on: ubuntu-latest # bun cross-compiles every target from one host
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Build all platform packages
        run: bun run build:npm
      - name: Publish to npm
        run: npm publish

  build-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          # for Universal macOS builds (arm64 and x86_64)
          - platform: "macos-latest"
            args: "--target universal-apple-darwin"
    runs-on: macos-latest
    env:
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: dtolnay/rust-toolchain@stable
        with:
          # Those targets are only used on macos runners so it's in an `if` to slightly speed up windows and linux builds.
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri
      - run: bun install --frozen-lockfile
      # Cross-compile the CLI for both macOS arches and stage them (+ the web app) for Tauri.
      # --universal produces argus-aarch64-apple-darwin and argus-x86_64-apple-darwin, both
      # required when Tauri builds a universal-apple-darwin bundle.
      - name: Stage sidecar + web
        run: bash scripts/stage-desktop-sidecar.sh --universal

      - name: import Apple Developer Certificate
        # Prevents keychain from locking automatically for 3600 seconds.
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          echo $APPLE_CERTIFICATE | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          security find-identity -v -p codesigning build.keychain

      - name: verify certificate
        run: |
          CERT_INFO=$(security find-identity -v -p codesigning build.keychain | grep "Developer ID Application")
          CERT_ID=$(echo "$CERT_INFO" | awk -F'"' '{print $2}')
          echo "CERT_ID=$CERT_ID" >> $GITHUB_ENV
          echo "Certificate imported."

      - name: Build (and sign, if secrets present) the desktop app
        uses: tauri-apps/tauri-action@v0
        env:
          # macOS signing + notarization — no-ops until these are set.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: argus-v__VERSION__
          releaseName: Argus v__VERSION__
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
